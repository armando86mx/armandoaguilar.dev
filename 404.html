<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>404 · Armando Aguilar</title>
<meta name="robots" content="noindex" />
<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
<link rel="stylesheet" href="/base.css" />
<style>
  body { min-height: 100vh; display: grid; place-items: center; position: relative; overflow: hidden; padding: 24px; }
  .e404-grid { position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px),
      linear-gradient(var(--grid-2) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-2) 1px, transparent 1px);
    background-size: 28px 28px, 28px 28px, 140px 140px, 140px 140px; }
  .e404-frame { position: fixed; inset: 14px; z-index: 0; pointer-events: none; border: 1px solid var(--line); }
  .e404-frame::before, .e404-frame::after { content:""; position: absolute; width: 11px; height: 11px; border: 1px solid var(--acc); }
  .e404-frame::before { top: -1px; left: -1px; border-right: 0; border-bottom: 0; }
  .e404-frame::after { bottom: -1px; right: -1px; border-left: 0; border-top: 0; }
  .e404 { position: relative; z-index: 1; text-align: center; max-width: 560px; }
  .e404 .kicker { font-family: var(--mono); font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--acc); margin-bottom: 24px; display: inline-flex; align-items: center; gap: 9px; }
  .e404 .kicker i { width: 8px; height: 8px; border-radius: 50%; background: var(--acc); flex-shrink: 0; }
  .e404 .big { font-family: var(--sans); font-size: clamp(104px, 24vw, 210px); font-weight: 700; line-height: .9;
    letter-spacing: -.04em; color: var(--fg); }
  .e404 .big span { color: var(--acc); }
  .e404 h1 { font-family: var(--sans); font-size: clamp(21px, 3.6vw, 30px); font-weight: 600; letter-spacing: -.01em;
    margin-top: 16px; color: var(--fg); }
  .e404 .sub { font-family: var(--mono); font-size: 13px; color: var(--fg-dim); margin-top: 10px; }
  .e404 .btn { font-family: var(--mono); font-size: 13px; padding: 13px 22px; margin-top: 36px; cursor: pointer;
    display: inline-flex; gap: 8px; align-items: center; border: 1px solid var(--acc); background: var(--acc);
    color: var(--bg); font-weight: 500; transition: transform .22s, box-shadow .22s; }
  .e404 .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 26px -12px var(--acc); }
</style>
</head>
<body>
<div class="e404-grid"></div>
<div class="e404-frame"></div>
<div class="e404">
  <span class="kicker"><i></i>Error 404 · Coordenada no encontrada</span>
  <div class="big">4<span>0</span>4</div>
  <h1>Esta página no existe.</h1>
  <p class="sub">This page doesn’t exist.</p>
  <a class="btn" href="/">← Volver al inicio</a>
</div>
</body>
</html>
