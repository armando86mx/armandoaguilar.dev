<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0f16;
    --bg-2: #0d141d;
    --panel: #0f1824;
    --line: #1d2b3b;
    --line-2: #16212e;
    --grid: rgba(120,170,225,0.06);
    --grid-2: rgba(120,170,225,0.11);
    --fg: #dde7f2;
    --fg-dim: #8195aa;
    --fg-faint: #566b80;
    --acc: oklch(0.82 0.12 226);
    --acc-soft: oklch(0.82 0.12 226 / 0.13);
    --sans: "Space Grotesk", system-ui, sans-serif;
    --mono: "IBM Plex Mono", ui-monospace, monospace;
  }
  html[data-theme="light"] {
    --bg: #eaf1f8;
    --bg-2: #e0e9f3;
    --panel: #ffffff;
    --line: #c4d4e4;
    --line-2: #d6e1ec;
    --grid: rgba(40,90,150,0.07);
    --grid-2: rgba(40,90,150,0.13);
    --fg: #102134;
    --fg-dim: #45607a;
    --fg-faint: #7c93aa;
    --acc: oklch(0.48 0.15 245);
    --acc-soft: oklch(0.48 0.15 245 / 0.1);
  }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--fg); font-family: var(--sans); line-height: 1.55;
    -webkit-font-smoothing: antialiased; overflow-x: hidden; transition: background .45s ease, color .45s ease; }
  #root { min-height: 100vh; }
  ::selection { background: var(--acc); color: var(--bg); }
  a { color: inherit; text-decoration: none; }
  ::-webkit-scrollbar { width: 10px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--line); border: 2px solid var(--bg); border-radius: 10px; }
</style>
